services:
  postgres:
    image: postgres:16
    container_name: marketpulse_postgres
    environment:
      POSTGRES_DB: marketpulse
      POSTGRES_USER: marketpulse_user
      POSTGRES_PASSWORD: marketpulse_pass
    ports:
      - "5432:5432"
    volumes:
      - marketpulse_postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: marketpulse_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: marketpulse_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: marketpulse_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  marketpulse_postgres_data:
